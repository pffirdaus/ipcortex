<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Loading Web App...</title>
  
  <script>
    // 1. Define the base URL of your Apps Script deployment.
    const APPS_SCRIPT_BASE_URL = "https://script.google.com/macros/s/AKfycbzrWrM6JBlYyhtCcX36baQtIbV-9FbtlFYE7mAcNuY9EwLiHx4sY4mAlMSmIHwM76OFQQ/exec";
    
    // 2. Get the parameters (the query string) from the current GitHub URL.
    //    Example: retrieves "?page=fs" from the GitHub link.
    const queryString = window.location.search; 

    // 3. Construct the new, complete URL.
    const targetUrl = APPS_SCRIPT_BASE_URL + queryString;
    
    // 4. Redirect the browser to the new URL immediately.
    window.location.replace(targetUrl);
  </script>
  
  <style>
    body { 
      font-family: sans-serif; 
      text-align: center; 
      padding-top: 50px; 
      margin: 0;
      color: #333;
      background-color: #f4f4f4;
    }
  </style>
</head>
<body>
  <h1>Redirecting to the Web Application...</h1>
  <p>If the page does not load automatically, please 
     <a id="fallback-link" href="#">click here to proceed</a>.
  </p>
  
  <script>
    // Update the fallback link dynamically in case JavaScript is blocked.
    document.getElementById('fallback-link').href = targetUrl;
  </script>
</body>
</html>
