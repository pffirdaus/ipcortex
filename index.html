<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Time Recorder</title>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: transform 0.1s, background 0.2s;
            width: 90%; /* Optimized for mobile touch */
            max-width: 300px;
        }
        .btn:active { transform: scale(0.95); background-color: #1557b0; }
        .btn:disabled { background-color: #aaa; }
        #msg { margin-top: 15px; font-size: 14px; color: #555; height: 20px; }
    </style>
</head>
<body>

    <button id="punchBtn" class="btn" onclick="sendData()">Record My Time</button>
    <div id="msg"></div>

    <script>
        function sendData() {
            const btn = document.getElementById('punchBtn');
            const msg = document.getElementById('msg');
            const url = "PASTE_YOUR_WEB_APP_URL_HERE";

            btn.disabled = true;
            msg.innerText = "Processing...";
            msg.style.color = "black";

            // We use 'no-cors' to prevent the multi-account redirect block
            fetch(url, {
                method: "GET",
                mode: "no-cors",
                cache: "no-cache"
            })
            .then(() => {
                msg.innerText = "? Logged Successfully!";
                msg.style.color = "green";
                setTimeout(() => {
                    msg.innerText = "";
                    btn.disabled = false;
                }, 4000);
            })
            .catch(err => {
                msg.innerText = "? Connection Error";
                msg.style.color = "red";
                btn.disabled = false;
            });
        }
    </script>
</body>
</html>
